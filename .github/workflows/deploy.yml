name: Deploy to GitHub Pages

# Build on every push to main, and allow manual runs from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant the token the permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Serve under https://<user>.github.io/<repo>/ — derived from the repo
          # name so this works on forks/renames with no edits.
          BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
